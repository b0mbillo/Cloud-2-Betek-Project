<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaCloud - Centro de Soporte | Login</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="login-style.css">
    <script src="../api-config.js"></script>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">☁️</div>
                <h1 class="login-title">NexaCloud</h1>
                <p class="login-subtitle">Centro de Soporte Técnico</p>
            </div>

            <!-- Alert Example (Comentado) -->
            <!-- <div class="alert alert-error">
                <span>❌ Usuario o contraseña incorrectos</span>
            </div> -->

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" name="remember" id="remember">
                        Recuérdame
                    </label>
                    <a href="#forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    Iniciar Sesión
                </button>
            </form>

            <div class="form-divider">
                ─ o ─
            </div>

            <p class="login-footer">
                ¿No tienes cuenta? 
                <a href="mailto:support@nexacloud.com">Contacta al administrador</a>
            </p>
        </div>
    </div>

    <script>
        async function loadNavbar() {
            const container = document.getElementById('navbar-container');
            if (!container) {
                return;
            }

            try {
                const response = await fetch('login-nav.html');
                container.innerHTML = await response.text();
            } catch (error) {
                console.error('No se pudo cargar login-nav.html', error);
            }
        }

        loadNavbar();

        // Manejo del formulario de login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = this.querySelector('button[type="submit"]');
            
            // Mostrar estado de carga
            submitBtn.disabled = true;
            submitBtn.textContent = 'Iniciando sesión...';
            
            try {
                // Llamar al API para autenticar
                const response = await loginUser(email, password);
                
                if (response.success) {
                    // El token ya fue guardado por loginUser()
                    // Mostrar mensaje de éxito
                    alert('✅ Sesión iniciada correctamente');
                    // Redirigir al panel de soporte
                    window.location.href = '../support/support.html';
                } else {
                    // Mostrar error del servidor
                    alert('❌ ' + (response.message || 'Error al iniciar sesión'));
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Iniciar Sesión';
                }
            } catch (error) {
                console.error('Error en login:', error);
                alert('❌ Error de conexión. Verifica la configuración del API en api-config.js');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar Sesión';
            }
        });

        // Recordar email si está marcado
        const rememberCheckbox = document.getElementById('remember');
        const emailInput = document.getElementById('email');

        if (localStorage.getItem('rememberedEmail')) {
            emailInput.value = localStorage.getItem('rememberedEmail');
            rememberCheckbox.checked = true;
        }

        rememberCheckbox.addEventListener('change', function() {
            if (this.checked) {
                localStorage.setItem('rememberedEmail', emailInput.value);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
        });

        emailInput.addEventListener('change', function() {
            if (rememberCheckbox.checked) {
                localStorage.setItem('rememberedEmail', this.value);
            }
        });
    </script>
</body>
</html>
